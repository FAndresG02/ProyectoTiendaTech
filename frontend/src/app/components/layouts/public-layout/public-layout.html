<div class="public-layout-page">

    <header class="public-layout-header">
        <mat-toolbar class="public-layout-toolbar">

            <a class="navbar-brand" href="#">Navbar</a>

            <nav class="nav-links">
                <a class="nav-link active" routerLink="/">Inicio</a>
                <a class="nav-link active" routerLink="/offer">Ofertas</a>
                <a class="nav-link active" routerLink="/allProducts">Todos los productos</a>
            </nav>

            <form class="search-form" role="search">
                <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
                    <input matInput placeholder="Buscar productos" />
                </mat-form-field>
                <button mat-stroked-button color="primary" class="search-button" type="submit">
                    Buscar
                </button>
            </form>

            <div class="toolbar-actions">
                <button mat-stroked-button class="login-button" type="button">
                    Iniciar Sesión
                </button>
                <button mat-flat-button class="register-button" type="button">
                    Registrarse
                </button>
                <button mat-icon-button class="cart-button" type="button" aria-label="Carrito">
                    <mat-icon>shopping_cart</mat-icon>
                </button>
            </div>

        </mat-toolbar>
    </header>

    <main>
        <router-outlet></router-outlet>
    </main>

    <footer class="footer" id="signup">
        <div class="footer-bg-shapes">
            <span class="shape shape-1"></span>
            <span class="shape shape-2"></span>
            <span class="shape shape-3"></span>
        </div>

        <div class="footer-content">
            <div class="footer-logo">FG</div>
            <h2 class="footer-name">Franklin Guapisaca</h2>
            <p class="footer-copy">&copy; 2025 Franklin Guapisaca. Todos los derechos reservados.</p>
        </div>
    </footer>
</div>
